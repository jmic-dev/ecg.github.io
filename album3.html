<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christmas Celebration Album</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
#lightbox-content img,
#lightbox-content iframe {
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:scale(0.95);}
  to { opacity:1; transform:scale(1);}
}
</style>
</head>

<body class="bg-slate-50">

<header class="bg-white shadow p-4 flex justify-between">
  <h1 class="font-bold text-xl">Christmas Celebration</h1>
  <a href="gallery.html" class="text-blue-600">← Back</a>
</header>

<!-- GRID -->
<section class="max-w-7xl mx-auto p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

  <div onclick="openLightbox(0)"><img src="https://images.unsplash.com/photo-1515169067868-5387ec356754" class="rounded"></div>
  <div onclick="openLightbox(1)"><img src="https://images.unsplash.com/photo-1543589077-47d81606c1bf" class="rounded"></div>

  <div onclick="openLightbox(2)" class="relative">
    <img src="https://img.youtube.com/vi/ysz5S6PUM-U/hqdefault.jpg" class="rounded">
    <i class="fas fa-play absolute inset-0 flex items-center justify-center text-white text-3xl"></i>
  </div>

  <div onclick="openLightbox(3)"><img src="https://images.unsplash.com/photo-1482517967863-00e15c9b44be" class="rounded"></div>

</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center">

<button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-4xl">&times;</button>

<button onclick="prevItem()" class="absolute left-6 top-1/2 -translate-y-1/2 text-white text-4xl">❮</button>
<button onclick="nextItem()" class="absolute right-6 top-1/2 -translate-y-1/2 text-white text-4xl">❯</button>

<div class="w-full max-w-5xl px-4 flex justify-center">
  <div id="lightbox-content" class="w-full flex justify-center"></div>
</div>

</div>

<script>
const items = [
{type:"image",src:"https://images.unsplash.com/photo-1515169067868-5387ec356754"},
{type:"image",src:"https://images.unsplash.com/photo-1543589077-47d81606c1bf"},
{type:"video",src:"https://www.youtube.com/embed/ysz5S6PUM-U"},
{type:"image",src:"https://images.unsplash.com/photo-1482517967863-00e15c9b44be"}
];

let currentIndex=0;

function openLightbox(i){
currentIndex=i;
document.getElementById("lightbox").classList.remove("hidden");
renderItem();
}

function closeLightbox(){
document.getElementById("lightbox").classList.add("hidden");
document.getElementById("lightbox-content").innerHTML="";
}

function renderItem(){
const item=items[currentIndex];
const box=document.getElementById("lightbox-content");

if(item.type==="image"){
box.innerHTML=`<img src="${item.src}" class="max-h-[80vh] rounded">`;
}else{
box.innerHTML=`<iframe class="w-full h-[500px]" src="${item.src}" allowfullscreen></iframe>`;
}
}

function nextItem(){currentIndex=(currentIndex+1)%items.length;renderItem();}
function prevItem(){currentIndex=(currentIndex-1+items.length)%items.length;renderItem();}
</script>

</body>
</html>
