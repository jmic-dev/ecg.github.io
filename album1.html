<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album - Community Outreach</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="bg-slate-50 text-slate-800">

<!-- HEADER -->
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Community Outreach Album</h1>
  <a href="gallery.html" class="text-blue-600">← Back to Gallery</a>
</header>

<!-- GRID -->
<section class="max-w-7xl mx-auto p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

  <!-- IMAGE -->
  <div class="cursor-pointer" onclick="openLightbox(0)">
    <img src="https://images.unsplash.com/photo-1529070538774-1843cb3265df" class="rounded-lg">
  </div>

  <div class="cursor-pointer" onclick="openLightbox(1)">
    <img src="https://images.unsplash.com/photo-1507692049790-de58290a4334" class="rounded-lg">
  </div>

  <!-- VIDEO -->
  <div class="cursor-pointer relative" onclick="openLightbox(2)">
    <img src="https://img.youtube.com/vi/ScMzIvxBSi4/hqdefault.jpg" class="rounded-lg">
    <i class="fas fa-play absolute inset-0 flex items-center justify-center text-white text-3xl"></i>
  </div>

  <div class="cursor-pointer" onclick="openLightbox(3)">
    <img src="https://images.unsplash.com/photo-1515169067868-5387ec356754" class="rounded-lg">
  </div>

</section>

<!-- LIGHTBOX -->
<div id="lightbox"
     class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center">

  <!-- CLOSE -->
  <button onclick="closeLightbox()"
          class="absolute top-6 right-6 text-white text-4xl z-50">
    &times;
  </button>

  <!-- PREV -->
  <button onclick="prevItem()"
          class="absolute left-4 md:left-10 top-1/2 -translate-y-1/2 text-white text-4xl z-50">
    ❮
  </button>

  <!-- NEXT -->
  <button onclick="nextItem()"
          class="absolute right-4 md:right-10 top-1/2 -translate-y-1/2 text-white text-4xl z-50">
    ❯
  </button>

  <!-- CONTENT WRAPPER -->
  <div class="w-full max-w-5xl px-4 flex justify-center items-center">
    <div id="lightbox-content" class="w-full flex justify-center items-center"></div>
  </div>

</div>

<!-- SCRIPT -->
<script>

const items = [
  { type: "image", src: "https://images.unsplash.com/photo-1529070538774-1843cb3265df" },
  { type: "image", src: "https://images.unsplash.com/photo-1507692049790-de58290a4334" },
  { type: "video", src: "https://www.youtube.com/embed/ScMzIvxBSi4" },
  { type: "image", src: "https://images.unsplash.com/photo-1515169067868-5387ec356754" }
];

let currentIndex = 0;

function openLightbox(index){
  currentIndex = index;
  document.getElementById("lightbox").classList.remove("hidden");
  renderItem();
}

function closeLightbox(){
  document.getElementById("lightbox").classList.add("hidden");
  document.getElementById("lightbox-content").innerHTML = "";
}

function renderItem(){
  const item = items[currentIndex];
  const container = document.getElementById("lightbox-content");

  if(item.type === "image"){
    container.innerHTML = `<img src="${item.src}" class="w-full rounded-lg">`;
  } else {
    container.innerHTML = `
      <iframe class="w-full h-[500px] rounded-lg"
      src="${item.src}"
      frameborder="0"
      allowfullscreen></iframe>
    `;
  }
}

function nextItem(){
  currentIndex = (currentIndex + 1) % items.length;
  renderItem();
}

function prevItem(){
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  renderItem();
}

</script>

</body>
</html>
